model:
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 3072
  vocab_size: 259
  max_seq_len: 1024
  dropout: 0.0

train:
  batch_size: 64
  learning_rate: 7.0e-4
  weight_decay: 0.1
  max_steps: 100000
  max_tokens: 4000000000
  warmup_steps: 1600
  grad_clip: 1.0
  eval_interval: 4000
  checkpoint_interval: 8000
  grad_accum_steps: 4
  compile: true
  precision: bf16
  muon_lr: 0.02
  muon_momentum: 0.95
  ns_steps: 5

data:
  dataset: fineweb
  dataset_size: 1B
  tokenized_dir: datasets/bytes/fineweb_1B
  representation: bytes
  token_dtype: auto

metrics:
  wandb_project: nash-llm
  wandb_enabled: true
  log_interval: 10
  eval_max_batches: 20
  final_eval_max_batches: 0
  metrics:
    - val_loss
    - accuracy
    - bits_per_byte
